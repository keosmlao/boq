name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # stable TypeScript type-stripping for `node --test`
          cache: npm
      - run: npm ci
      # Type errors fail the build (next.config has ignoreBuildErrors: false).
      - run: npm run typecheck
      - run: npm test
